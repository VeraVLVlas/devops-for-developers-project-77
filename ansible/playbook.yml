---
- name: Prepare web servers and deploy app
  hosts: webservers
  become: true

  roles:
    - role: geerlingguy.docker
      tags: setup

  tasks:
    - name: Install pip
      apt:
        name: python3-pip
        state: present
        update_cache: true
      tags: setup

    - name: Install compatible Docker SDK for Python
      pip:
        name: docker==6.1.3
        executable: pip3
        extra_args: --break-system-packages --ignore-installed
      tags: setup

    - name: Run application container
      shell: |
        docker rm -f app || true
        docker run -d \
          --name app \
          --restart always \
          -p 80:80 \
          nginx:alpine
      tags: deploy
    
    - name: Run application container
      shell: |
        docker rm -f app || true
        docker run -d \
          --name app \
          --restart always \
          -p 80:80 \
          traefik/whoami
      tags: deploy

- name: Prepare load balancer
  hosts: loadbalancers
  become: true

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: true
      tags: setup

    - name: Configure nginx load balancer
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          upstream app_servers {
              server 192.168.0.8:80;
              server 192.168.0.4:80;
          }

          server {
              listen 80;

              location / {
                  proxy_pass http://app_servers;
              }
          }
      tags: deploy

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
      tags: deploy

- name: Install Datadog Agent
  hosts: all
  become: true
  vars_files:
    - group_vars/vault.yml
  vars:
    datadog_site: "datadoghq.eu"
    datadog_agent_major_version: 7
    datadog_config:
      tags:
        - "env:local"
        - "project:devops-project"
  roles:
    - role: datadog.dd.agent
      tags: monitoring